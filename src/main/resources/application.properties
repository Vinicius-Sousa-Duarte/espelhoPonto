spring.application.name=espelhoPonto

spring.datasource.url=${DB_URL:jdbc:h2:mem:pontodb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.jpa.show-sql=true

api.security.token.secret=${JWT_SECRET:minha-chave-secreta-muito-segura-123456}