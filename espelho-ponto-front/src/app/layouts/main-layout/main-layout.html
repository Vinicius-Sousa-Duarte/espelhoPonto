<mat-sidenav-container class="sidenav-container">
  
  <mat-sidenav mode="side" [opened]="menuAberto" class="sidenav">
    
    <div class="logo-container">
      <div class="logo-icon">
        <mat-icon>watch_later</mat-icon>
      </div>
      <span class="logo-text">EspelhoPonto</span>
    </div>
    
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/historico" routerLinkActive="active-link">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>Histórico</span>
      </a>

      <a mat-list-item *ngIf="isAdmin" routerLink="/admin/usuarios" routerLinkActive="active-link">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Novo Usuário</span>
      </a>

      <a mat-list-item (click)="logout()" class="logout-btn">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Sair</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>
    
    <div class="top-bar-toggle">
      <button mat-icon-button class="btn-toggle-menu" (click)="toggleMenu()" matTooltip="Recolher/Expandir Menu">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
